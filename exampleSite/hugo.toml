baseURL       = "/"
languageCode  = "en-us"
title         = "Roxo | Creative Design Agency"
theme         = "roxo-hugo"
summarylength = 25

######################## Markup ##################################
[markup.goldmark.renderer]
  unsafe = true

######################## Build Cache Busters #####################
[build]
  [build.cachebusters]
    [build.cachebusters.js]
      dir = ":assetDir/js"
      filename = ":filename"
    [build.cachebusters.css]
      dir = ":assetDir/scss"
      filename = ":filename"
    [build.cachebusters.assets]
      dir = ":assetDir"
      filename = ":filename"

######################## Outputs #################################
[outputs]
  home = ["HTML", "RSS"]

######################## Imaging #################################
[imaging]
  quality = 90
  resampleFilter = "Lanczos"

######################## Services ################################
[services]
  [services.googleAnalytics]
    ID = "YOUR GOOGLE ANALYTICS CODE"

######################## Menus ###################################
[[menu.nav]]
  name   = "Home"
  url    = ""
  weight = 1
[[menu.nav]]
  name   = "About"
  url    = "about"
  weight = 2
[[menu.nav]]
  name   = "Portfolio"
  url    = "portfolio"
  weight = 3
[[menu.nav]]
  name   = "Blog"
  url    = "blog"
  weight = 4
[[menu.nav]]
  name   = "Get in touch"
  url    = "contact"
  weight = 5

######################## Site Params #############################
[params]
  logo                  = "images/logo.png"
  logo_footer           = "images/logo-footer.png"
  favicon_icon          = "images/favicon.ico"
  favicon_shortcut_icon = "images/favicon.png"
  custom_stylesheets    = []
  dateFormat            = "26 FEB 1994"
  description           = "Roxo Hugo themes | Design Agency Template by Furioustheme"
  author                = "Furioustheme"
  fabform               = "https://fabform.io/f/USAg2Jl"

  [params.contactForm]
    placeholder_first_name        = "First Name"
    placeholder_last_name         = "Last Name"
    placeholder_email             = "Email"
    placeholder_project_type      = "Project Type"
    placeholder_about_the_project = "About the Project"
    send_message                  = "Send Message"
    [[params.contactForm.projectType]]
      value = "gd"
      title = "Graphics Design"
    [[params.contactForm.projectType]]
      value = "wd"
      title = "Web Design"

  [params.navAction]
    status = true
    name   = "Get in touch"
    url    = "contact"

  [params.blog]
    read_more = "read more"

  [params.portfolio]
    enable       = true
    title        = "OUR RECENT WORKS"
    subtitle     = "Crafting experiences and seeking to make the complex clear & beautiful."
    view_project = "view project"
    more_works   = "MORE WORKS"
    scroll_down  = "scroll down"

  [params.footer]
    qr_print = false
    [params.footer.contactInfo]
      title   = "Contact Info"
      address = "713 Elmwood St.<br>Prior Lake, MN 55372"
      phone   = "409-896-1444"
      email   = "info@roxo.co"
    [params.footer.sitemap]
      title = "Sitemap"
      [[params.footer.sitemap.link]]
        name = "About Company"
        url  = "about"
      [[params.footer.sitemap.link]]
        name = "Projects"
        url  = "portfolio"
      [[params.footer.sitemap.link]]
        name = "Blog"
        url  = "blog"
      [[params.footer.sitemap.link]]
        name = "Contact"
        url  = "contact"
    [params.footer.social]
      title = "Social Media"
      [[params.footer.social.link]]
        name = "Medium"
        url  = "#"
      [[params.footer.social.link]]
        name = "Behance"
        url  = "#"
      [[params.footer.social.link]]
        name = "Dribbble"
        url  = "#"
      [[params.footer.social.link]]
        name = "Instagram"
        url  = "#"
    [params.footer.service]
      title       = "We help brands:"
      description = "develop design solutions<br>produce valuable cultural content<br>create fresh brand experience"
    [params.footer.back_to_top]
      description = "I want to <br> visit again"

######################## CSS Plugins #############################
[[params.plugins.css]]
  link = "plugins/bootstrap/bootstrap.min.css"
[[params.plugins.css]]
  link = "font-awesome/css/font-awesome.min.css"

######################## JS Plugins ##############################
# vendor.js and script.js processed via Hugo asset pipeline in footer.html
